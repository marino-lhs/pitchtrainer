<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Trainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #f5f4ef;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    color: #1a1a18;
  }
  .wrap { max-width: 440px; width: 100%; }
  .top-row { display: flex; align-items: center; margin-bottom: 1.25rem; }
  .mode-toggle { display: flex; border: 0.5px solid rgba(0,0,0,0.25); border-radius: 8px; overflow: hidden; background: #fff; }
  .mode-btn {
    padding: 7px 18px; font-size: 13px; font-family: inherit;
    background: transparent; border: none; cursor: pointer;
    color: #888; font-weight: 400; transition: background 0.15s;
  }
  .mode-btn.active { color: #185FA5; font-weight: 500; box-shadow: inset 0 0 0 2px #378ADD; }
  .score-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .metric { background: #e8e7e0; border-radius: 8px; padding: 0.75rem 1rem; text-align: center; }
  .metric-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .metric-value { font-size: 22px; font-weight: 500; }
  @keyframes flashGreen { 0%,100% { background: #e8e7e0; } 40% { background: #C0DD97; } }
  .metric.flash-green { animation: flashGreen 0.75s ease-out; }
  .mid-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem; padding: 0.75rem 1rem;
    background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px;
  }
  .mid-left { display: flex; gap: 8px; align-items: center; min-width: 88px; }
  .mid-center { text-align: center; flex: 1; }
  .diff-pct { font-size: 24px; font-weight: 500; line-height: 1.1; }
  .diff-sub { font-size: 11px; color: #888; }
  .mid-right { display: flex; gap: 5px; align-items: center; min-width: 88px; justify-content: flex-end; }
  .heart { font-size: 18px; transition: opacity 0.2s; }
  .heart.lost { opacity: 0.2; }
  .lifeline-btn {
    width: 38px; height: 38px; border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,0.2); background: #e8e7e0;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; position: relative; overflow: hidden; padding: 0;
  }
  .lifeline-btn:hover:not(:disabled) { background: #d8d7d0; }
  .lifeline-btn:disabled { cursor: default; opacity: 0.35; }
  .lifeline-btn.used { opacity: 0.25; }
  .lifeline-btn.used::after {
    content: ''; position: absolute; top: 0; left: 50%;
    width: 2px; height: 100%; background: #1a1a18;
    transform: rotate(45deg); transform-origin: center; pointer-events: none;
  }
  .lifeline-btn svg { width: 26px; height: 26px; display: block; }
  .status { font-size: 13px; color: #888; min-height: 18px; text-align: center; margin-bottom: 0.4rem; }
  .feedback { font-size: 14px; font-weight: 500; min-height: 20px; text-align: center; margin-bottom: 0.75rem; }
  .feedback.good { color: #3B6D11; }
  .feedback.bad { color: #A32D2D; }
  .action-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 1rem; }
  .choice-btn {
    width: 72px; height: 72px; border-radius: 12px;
    border: 0.5px solid rgba(0,0,0,0.2); background: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; padding: 0; flex-shrink: 0;
  }
  .choice-btn:hover:not(:disabled) { background: #e8e7e0; }
  .choice-btn:disabled { opacity: 0.45; cursor: default; }
  .choice-btn.correct { background: #EAF3DE; border-color: #639922; }
  .choice-btn.wrong { background: #FCEBEB; border-color: #E24B4A; }
  .choice-btn svg { width: 36px; height: 36px; }
  .play-btn {
    width: 80px; height: 80px; border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,0.2); background: #e8e7e0;
    cursor: pointer; font-size: 26px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s; flex-shrink: 0;
  }
  .play-btn:hover:not(:disabled) { background: #d8d7d0; }
  .play-btn:active:not(:disabled) { transform: scale(0.96); }
  .play-btn:disabled { opacity: 0.35; cursor: default; }
  .practice-start {
    display: none; background: #e8e7e0; border-radius: 8px;
    padding: 0.75rem 1rem; margin-bottom: 1.25rem;
  }
  .practice-start label { font-size: 12px; color: #666; display: block; margin-bottom: 6px; }
  .preset-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .preset-btn {
    padding: 5px 12px; font-size: 13px; font-family: inherit;
    border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px;
    background: #fff; cursor: pointer; color: #1a1a18;
  }
  .preset-btn.selected { border-color: #378ADD; color: #185FA5; font-weight: 500; }
  .badge-section { margin-top: 0.25rem; min-height: 44px; }
  .badge-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge-label { font-size: 13px; color: #888; white-space: nowrap; }
  @keyframes badgePop { 0% { transform: scale(0); opacity: 0; } 65% { transform: scale(1.35); } 100% { transform: scale(1); opacity: 1; } }
  .badge-icon { font-size: 28px; cursor: default; display: inline-block; animation: badgePop 0.4s ease-out; position: relative; }
  .badge-icon:hover::after {
    content: attr(data-tip);
    position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
    background: #1a1a18; color: #fff; font-size: 11px; padding: 4px 8px;
    border-radius: 6px; white-space: nowrap; pointer-events: none;
    font-family: -apple-system, sans-serif; font-weight: 400;
  }
  .game-over {
    display: none; text-align: center; padding: 2rem;
    background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px;
  }
  .game-over h2 { font-size: 20px; font-weight: 500; margin-bottom: 0.5rem; }
  .game-over p { font-size: 14px; color: #666; margin-bottom: 1.25rem; line-height: 1.6; }
  .drummer-msg { font-size: 13px; color: #666; margin-bottom: 1rem; }
  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .action-btn {
    padding: 0.7rem 1.4rem; border: 0.5px solid rgba(0,0,0,0.2);
    border-radius: 8px; background: #e8e7e0; cursor: pointer;
    font-size: 14px; font-family: inherit; color: #1a1a18;
  }
  .action-btn:hover { background: #d8d7d0; }
  .action-btn.blue { border-color: #378ADD; color: #185FA5; }
  .share-feedback { font-size: 12px; color: #888; margin-top: 10px; min-height: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-challenge">Challenge</button>
      <button class="mode-btn" id="btn-practice">Practice</button>
    </div>
  </div>

  <div class="score-row">
    <div class="metric" id="metric-left">
      <div class="metric-label" id="label-left">score</div>
      <div class="metric-value" id="val-left">0</div>
    </div>
    <div class="metric" id="metric-right">
      <div class="metric-label" id="label-right">round</div>
      <div class="metric-value" id="val-right">1</div>
    </div>
  </div>

  <div class="practice-start" id="practice-start">
    <label>start difficulty</label>
    <div class="preset-grid" id="preset-grid"></div>
  </div>

  <div id="main-game">
    <div class="mid-row">
      <div class="mid-left" id="mid-left">
        <button class="lifeline-btn" id="ll1" disabled>
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M4 14 A10 10 0 1 0 7.5 6.5" stroke="#1a1a18" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <polygon points="2.5,1.5 9,7.5 1.5,10.5" fill="#1a1a18"/>
          </svg>
        </button>
        <button class="lifeline-btn" id="ll2" disabled>
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M4 14 A10 10 0 1 0 7.5 6.5" stroke="#1a1a18" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <polygon points="2.5,1.5 9,7.5 1.5,10.5" fill="#1a1a18"/>
          </svg>
        </button>
      </div>
      <div class="mid-center">
        <div class="diff-pct" id="diff-pct">100%</div>
        <div class="diff-sub">of a half step</div>
      </div>
      <div class="mid-right" id="mid-right">
        <span class="heart" id="h1">♥</span>
        <span class="heart" id="h2">♥</span>
        <span class="heart" id="h3">♥</span>
      </div>
    </div>

    <div class="status" id="status">press play to hear two tones</div>
    <div class="feedback" id="feedback"></div>

    <div class="action-row">
      <button class="choice-btn" id="btn-flat" disabled>
        <svg viewBox="0 0 36 36" fill="none">
          <line x1="18" y1="5" x2="18" y2="27" stroke="#1a1a18" stroke-width="2.5" stroke-linecap="round"/>
          <polygon points="18,31 9,20 27,20" fill="#1a1a18"/>
        </svg>
      </button>
      <button class="play-btn" id="play-btn">▶</button>
      <button class="choice-btn" id="btn-sharp" disabled>
        <svg viewBox="0 0 36 36" fill="none">
          <line x1="18" y1="31" x2="18" y2="9" stroke="#1a1a18" stroke-width="2.5" stroke-linecap="round"/>
          <polygon points="18,5 9,16 27,16" fill="#1a1a18"/>
        </svg>
      </button>
    </div>

    <div class="badge-section" id="badge-section">
      <div class="badge-row">
        <span class="badge-label" id="badge-label">Badges Achieved:</span>
        <span id="badge-icons"></span>
      </div>
    </div>
  </div>

  <div class="game-over" id="game-over">
    <h2>Game over</h2>
    <p id="final-msg"></p>
    <div id="drummer-msg" class="drummer-msg" style="display:none"></div>
    <div class="btn-row">
      <button class="action-btn" id="restart-btn">play again</button>
      <button class="action-btn blue" id="share-btn">share score</button>
    </div>
    <div class="share-feedback" id="share-feedback"></div>
  </div>
</div>

<script>
(function() {
  const WARMUP = [100, 50, 33, 22];
  const ROUND_THRESHOLDS = [33, 16, 10, 6, 3.25, 2, 1];
  const AUTO_MS = 1500;
  const FREQ_MIN = 164.81; // E3
  const FREQ_MAX = 880;    // A5
  const TONE_DUR = 1.3;
  const TONE_GAP = 0.7;
  const A3_FREQ = 220;
  const ADVANCED_THRESHOLD = 18.7;

  const PRACTICE_PRESETS = [
    { label: 'Half Step', value: 100, warmup: true },
    { label: '20%',       value: 20,  warmup: false },
    { label: '10%',       value: 10,  warmup: false },
    { label: '5%',        value: 5,   warmup: false },
  ];

  // Comments — no periods, keep exclamation points
  const EARLY_CORRECT = ['Correct', 'Well done', 'Nice work', 'Great job'];
  const ADVANCED_CORRECT = [
    'Awesome', 'Keep it up!', 'Impressive', 'Sweet!', 'Slay',
    'Pop off!', 'Let them cook!', 'Huge W', "You're locked in",
    'Immaculate vibes', 'Strong aura', 'You should turn pro'
  ];
  const FIRE_COMMENT = "You're on fire!";
  const WRONG_MSGS = [
    'Crashed out', 'Cooked', 'Skill issue', 'Taking the L',
    "I'm crying", 'Caught in 4k', "You're giving 'bad ear'",
    "It's the effort for me", 'Is everything ok?', 'Try again',
    'Yikes', "How's your rhythm?"
  ];

  // Badges: id, emoji, alt text, threshold type, threshold value
  const BADGE_DEFS = [
    { id: 'musician', emoji: '🎻', alt: 'You must be a Musician!',  type: 'diff',     value: 9.8  },
    { id: 'mozart',   emoji: '🎹', alt: 'Child Prodigy',            type: 'diff',     value: 5.1  },
    { id: 'bat',      emoji: '🦇', alt: 'Supersonic Hearing',       type: 'diff',     value: 2.7  },
    { id: 'robot',    emoji: '🤖', alt: 'Are you even human?',      type: 'diff',     value: 1.0  },
    { id: 'fire',     emoji: '🔥', alt: 'On Fire',                  type: 'streak15', value: 3    },
    { id: 'whale',    emoji: '🐋', alt: 'Whale Whisperer',          type: 'lowfreq',  value: 3    },
  ];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // State
  let practiceMode = false, practiceWarmup = true, selectedPresetIdx = 0;
  let score = 0, totalCorrect = 0, attempted = 0;
  let difficulty = 100, lives = 3, lifelinesLeft = 2;
  let bestDiff = 100, sessionStartDiff = 100, lastCorrectDiff = 100, consecutiveWrong = 0;
  let answered = false, correctAnswer = null;
  let lastBaseFreq = null, lastSecondFreq = null;
  let hasPlayed = false, isFirst = true;
  let audioCtx = null, advTimer = null;
  let ll1Used = false, ll2Used = false;
  let roundLevel = 1;
  let lowFreqCorrectCount = 0;
  let streak15 = 0;
  let badgesEarned = {};
  let advancedCommentMode = false;
  let earlyCorrectIndex = 0;
  let advancedPool = [];
  let wrongPool = [];

  const $ = id => document.getElementById(id);

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playTone(freq, t0, dur, ctx) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.35, t0 + 0.05);
    g.gain.setValueAtTime(0.35, t0 + dur - 0.05);
    g.gain.linearRampToValueAtTime(0, t0 + dur);
    osc.start(t0); osc.stop(t0 + dur);
  }

  function playPair(f1, f2) {
    const ctx = getCtx(), now = ctx.currentTime + 0.05;
    playTone(f1, now, TONE_DUR, ctx);
    playTone(f2, now + TONE_DUR + TONE_GAP, TONE_DUR, ctx);
    return (TONE_DUR + TONE_GAP + TONE_DUR + 0.15) * 1000;
  }

  function semitoneRatio(pct) { return Math.pow(2, pct / 1200); }
  function useWarmup() { return !practiceMode || practiceWarmup; }

  function nextDiffAfterCorrect() {
    if (useWarmup() && totalCorrect < WARMUP.length) return WARMUP[totalCorrect];
    return Math.max(difficulty * 0.85, 0.1);
  }

  function getCorrectComment(diffAtAnswer) {
    // Check if fire badge just earned — handled separately before calling this
    if (!advancedCommentMode && diffAtAnswer <= ADVANCED_THRESHOLD) {
      advancedCommentMode = true;
      advancedPool = shuffle(ADVANCED_CORRECT);
    }
    if (!advancedCommentMode) {
      const msg = EARLY_CORRECT[earlyCorrectIndex % EARLY_CORRECT.length];
      earlyCorrectIndex++;
      return msg;
    } else {
      if (!advancedPool.length) advancedPool = shuffle(ADVANCED_CORRECT);
      return advancedPool.pop();
    }
  }

  function getWrongComment() {
    if (!wrongPool.length) wrongPool = shuffle(WRONG_MSGS);
    return wrongPool.pop();
  }

  function earnBadge(id) {
    if (badgesEarned[id]) return false;
    badgesEarned[id] = true;
    const def = BADGE_DEFS.find(b => b.id === id);
    if (!def) return false;
    const span = document.createElement('span');
    span.className = 'badge-icon';
    span.textContent = def.emoji;
    span.setAttribute('data-tip', def.alt);
    span.title = def.alt;
    $('badge-icons').appendChild(span);
    return true;
  }

  function checkBadges(diffAtAnswer, baseFreq, isCorrect) {
    let fireJustEarned = false;
    if (!isCorrect) {
      streak15 = 0;
      return false;
    }
    // Diff-based badges
    if (diffAtAnswer <= 9.8) earnBadge('musician');
    if (diffAtAnswer <= 5.1) earnBadge('mozart');
    if (diffAtAnswer <= 2.7) earnBadge('bat');
    if (diffAtAnswer <= 1.0) earnBadge('robot');
    // Low freq whale badge
    if (baseFreq <= A3_FREQ) {
      lowFreqCorrectCount++;
      if (lowFreqCorrectCount >= 3) earnBadge('whale');
    }
    // Fire streak
    if (diffAtAnswer <= 15) {
      streak15++;
      if (streak15 >= 3 && !badgesEarned['fire']) {
        earnBadge('fire');
        fireJustEarned = true;
      }
    } else {
      streak15 = 0;
    }
    return fireJustEarned;
  }

  function updateDiffDisplay() {
    const d = difficulty;
    $('diff-pct').textContent = (d >= 1 ? d.toFixed(1) : d.toFixed(2)) + '%';
  }

  function updateCounters() {
    if (practiceMode) {
      $('val-left').textContent = attempted;
      $('val-right').textContent = totalCorrect;
    } else {
      $('val-left').textContent = score;
      $('val-right').textContent = roundLevel;
    }
  }

  function updateLives() {
    for (let i = 1; i <= 3; i++)
      $('h' + i).className = 'heart' + (i <= lives ? '' : ' lost');
  }

  function updateLifelines() {
    if (practiceMode) {
      $('ll1').style.visibility = 'hidden';
      $('ll2').style.visibility = 'hidden';
      return;
    }
    $('ll1').style.visibility = 'visible';
    $('ll2').style.visibility = 'visible';
    $('ll1').disabled = ll1Used || !hasPlayed || answered;
    $('ll2').disabled = ll2Used || !hasPlayed || answered;
    $('ll1').className = 'lifeline-btn' + (ll1Used ? ' used' : '');
    $('ll2').className = 'lifeline-btn' + (ll2Used ? ' used' : '');
  }

  function flashRound() {
    const el = $('metric-right');
    el.classList.remove('flash-green');
    void el.offsetWidth;
    el.classList.add('flash-green');
    setTimeout(() => el.classList.remove('flash-green'), 750);
  }

  function setModeUI() {
    if (practiceMode) {
      $('label-left').textContent = 'attempted';
      $('label-right').textContent = 'correct';
      $('mid-right').style.visibility = 'hidden';
      $('practice-start').style.display = 'block';
      $('badge-section').style.display = 'none';
    } else {
      $('label-left').textContent = 'score';
      $('label-right').textContent = 'round';
      $('mid-right').style.visibility = 'visible';
      $('practice-start').style.display = 'none';
      $('badge-section').style.display = 'block';
    }
  }

  function buildPresets() {
    const grid = $('preset-grid');
    grid.innerHTML = '';
    PRACTICE_PRESETS.forEach((p, i) => {
      const btn = document.createElement('button');
      btn.className = 'preset-btn' + (i === selectedPresetIdx ? ' selected' : '');
      btn.textContent = p.label;
      btn.addEventListener('click', () => {
        selectedPresetIdx = i;
        practiceWarmup = PRACTICE_PRESETS[i].warmup;
        difficulty = PRACTICE_PRESETS[i].value;
        sessionStartDiff = difficulty; lastCorrectDiff = difficulty;
        totalCorrect = 0; consecutiveWrong = 0;
        document.querySelectorAll('.preset-btn').forEach(b => b.className = 'preset-btn');
        btn.className = 'preset-btn selected';
        updateDiffDisplay(); updateCounters();
      });
      grid.appendChild(btn);
    });
  }

  function newQuestion() {
    answered = false; hasPlayed = false;
    correctAnswer = Math.random() < 0.5 ? 'flat' : 'sharp';
    lastBaseFreq = null; lastSecondFreq = null;
    $('btn-flat').disabled = true; $('btn-sharp').disabled = true;
    $('btn-flat').className = 'choice-btn'; $('btn-sharp').className = 'choice-btn';
    $('feedback').textContent = ''; $('feedback').className = 'feedback';
    $('play-btn').disabled = false;
    $('status').textContent = isFirst ? 'press play to hear two tones' : '';
    updateDiffDisplay(); updateLifelines();
  }

  function handlePlay() {
    const ratio = semitoneRatio(difficulty);
    const base = FREQ_MIN + Math.random() * (FREQ_MAX - FREQ_MIN);
    const second = correctAnswer === 'sharp' ? base * ratio : base / ratio;
    lastBaseFreq = base; lastSecondFreq = second;
    hasPlayed = true; isFirst = false;
    $('play-btn').disabled = true;
    $('status').textContent = '';
    const waitMs = playPair(base, second);
    setTimeout(() => {
      if (!answered) {
        $('btn-flat').disabled = false; $('btn-sharp').disabled = false;
        if (!practiceMode) updateLifelines();
      }
    }, waitMs);
  }

  function useLifeline(which) {
    if (answered) return;
    if (which === 1 && !ll1Used) ll1Used = true;
    else if (which === 2 && !ll2Used) ll2Used = true;
    else return;
    lifelinesLeft--;
    score = Math.max(0, score - 25);
    updateCounters(); updateLifelines();
    $('btn-flat').disabled = true; $('btn-sharp').disabled = true;
    const waitMs = playPair(lastBaseFreq, lastSecondFreq);
    setTimeout(() => {
      if (!answered) {
        $('btn-flat').disabled = false; $('btn-sharp').disabled = false;
        updateLifelines();
      }
    }, waitMs);
  }

  function handleAnswer(choice) {
    if (answered) return;
    answered = true;
    $('btn-flat').disabled = true; $('btn-sharp').disabled = true;
    $('play-btn').disabled = true;
    updateLifelines();

    const correct = choice === correctAnswer;
    const diffAtAnswer = difficulty;
    const baseAtAnswer = lastBaseFreq;

    (choice === 'flat' ? $('btn-flat') : $('btn-sharp')).className = 'choice-btn ' + (correct ? 'correct' : 'wrong');
    if (!correct) (correctAnswer === 'flat' ? $('btn-flat') : $('btn-sharp')).className = 'choice-btn correct';

    if (correct) {
      lastCorrectDiff = difficulty;
      consecutiveWrong = 0;
      totalCorrect++;
      attempted++;
      score += Math.round(100 / Math.max(diffAtAnswer, 0.1));
      difficulty = nextDiffAfterCorrect();
      bestDiff = Math.min(bestDiff, difficulty);

      const fireJustEarned = !practiceMode ? checkBadges(diffAtAnswer, baseAtAnswer, true) : false;

      if (!practiceMode) {
        // Check round advancement
        if (roundLevel <= ROUND_THRESHOLDS.length && diffAtAnswer <= ROUND_THRESHOLDS[roundLevel - 1]) {
          roundLevel++;
          flashRound();
        }
        let comment;
        if (fireJustEarned) {
          comment = FIRE_COMMENT;
        } else {
          comment = getCorrectComment(diffAtAnswer);
        }
        $('feedback').textContent = comment;
        $('feedback').className = 'feedback good';
      } else {
        $('feedback').textContent = 'correct!';
        $('feedback').className = 'feedback good';
      }

    } else {
      attempted++;
      consecutiveWrong++;
      if (!practiceMode) checkBadges(diffAtAnswer, baseAtAnswer, false);

      if (!practiceMode) {
        difficulty = consecutiveWrong === 1
          ? (difficulty + lastCorrectDiff) / 2
          : lastCorrectDiff;
        lives--; updateLives();
        $('feedback').textContent = getWrongComment();
      } else {
        if (consecutiveWrong === 1) difficulty = (difficulty + lastCorrectDiff) / 2;
        else if (consecutiveWrong === 2) difficulty = lastCorrectDiff;
        else difficulty = Math.min(difficulty * 1.3, sessionStartDiff);
        $('feedback').textContent = correctAnswer === 'flat' ? 'not quite — it was lower' : 'not quite — it was higher';
      }
      $('feedback').className = 'feedback bad';
    }

    updateDiffDisplay(); updateCounters();

    if (!practiceMode && lives <= 0) {
      setTimeout(showGameOver, 1000);
    } else {
      advTimer = setTimeout(newQuestion, AUTO_MS);
    }
  }

  function showGameOver() {
    $('main-game').style.display = 'none';
    $('game-over').style.display = 'block';
    const roundsCompleted = roundLevel - 1;
    $('final-msg').innerHTML =
      `You scored <strong>${score}</strong> points and completed <strong>${roundsCompleted}</strong> round${roundsCompleted !== 1 ? 's' : ''}.<br>` +
      `Best difficulty: <strong>${bestDiff.toFixed(1)}%</strong> of a half step.`;
    const drumDiv = $('drummer-msg');
    if (!practiceMode && roundLevel === 1) {
      drumDiv.innerHTML = '<div style="font-size:36px;margin:0.5rem 0">🥁</div><div>Are you a drummer?</div>';
      drumDiv.style.display = 'block';
    } else {
      drumDiv.style.display = 'none';
    }
  }

  function shareScore() {
    const url = 'https://yourpitchgame.com';
    const text = `I scored ${score} points and was able to detect up to ${bestDiff.toFixed(1)}% of a half step! Can you beat my score? Try it: ${url}`;
    const fb = $('share-feedback');
    if (navigator.share) {
      navigator.share({ text }).catch(() => tryCopy(text, fb));
    } else { tryCopy(text, fb); }
  }

  function tryCopy(text, fb) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        fb.textContent = 'copied to clipboard!';
        setTimeout(() => fb.textContent = '', 3000);
      }).catch(() => { fb.textContent = text; });
    } else { fb.textContent = text; }
  }

  function restart() {
    if (advTimer) clearTimeout(advTimer);
    score = 0; totalCorrect = 0; attempted = 0;
    lives = 3; lifelinesLeft = 2;
    ll1Used = false; ll2Used = false;
    consecutiveWrong = 0; isFirst = true;
    roundLevel = 1;
    lowFreqCorrectCount = 0;
    streak15 = 0;
    badgesEarned = {};
    advancedCommentMode = false;
    earlyCorrectIndex = 0;
    advancedPool = [];
    wrongPool = [];
    $('badge-icons').innerHTML = '';
    if (practiceMode) {
      const p = PRACTICE_PRESETS[selectedPresetIdx];
      difficulty = p.value; practiceWarmup = p.warmup;
    } else {
      difficulty = WARMUP[0];
    }
    sessionStartDiff = difficulty; lastCorrectDiff = difficulty; bestDiff = difficulty;
    $('main-game').style.display = 'block';
    $('game-over').style.display = 'none';
    $('share-feedback').textContent = '';
    updateLives(); updateDiffDisplay(); updateCounters(); newQuestion();
  }

  $('btn-challenge').addEventListener('click', () => {
    if (practiceMode) {
      practiceMode = false;
      $('btn-challenge').className = 'mode-btn active';
      $('btn-practice').className = 'mode-btn';
      setModeUI(); restart();
    }
  });
  $('btn-practice').addEventListener('click', () => {
    if (!practiceMode) {
      practiceMode = true;
      $('btn-practice').className = 'mode-btn active';
      $('btn-challenge').className = 'mode-btn';
      setModeUI(); buildPresets(); restart();
    }
  });
  $('play-btn').addEventListener('click', handlePlay);
  $('ll1').addEventListener('click', () => useLifeline(1));
  $('ll2').addEventListener('click', () => useLifeline(2));
  $('btn-flat').addEventListener('click', () => handleAnswer('flat'));
  $('btn-sharp').addEventListener('click', () => handleAnswer('sharp'));
  $('restart-btn').addEventListener('click', restart);
  $('share-btn').addEventListener('click', shareScore);

  setModeUI(); updateLives(); updateLifelines(); updateCounters(); newQuestion();
})();
</script>
</body>
</html>
